[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

# 1. توجيه طلبات السيرفر وقاعدة البيانات إلى Cloud Run
[[redirects]]
  from = "/api/*"
  to = "https://ryvo-store-612389179129.europe-west1.run.app/api/:splat"
  status = 200
  force = true

# 2. توجيه صفحات المتجر الداخلية (SPA Routing)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# 3. رؤوس الأمان لحماية المتجر
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
